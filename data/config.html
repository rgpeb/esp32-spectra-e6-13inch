<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Frame Onboarding</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 560px; margin: 0 auto; padding: 16px; }
    h1 { font-size: 1.3rem; }
    label { display: block; margin: 12px 0 6px; font-weight: 600; }
    input, select, button { width: 100%; padding: 10px; margin-bottom: 8px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
    .status { min-height: 20px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>E-Ink Photo Frame Onboarding</h1>

  <form id="configForm" class="card">
    <label for="ssid">WiFi SSID</label>
    <input id="ssid" name="ssid" type="text" value="{{CURRENT_SSID}}" required />

    <label for="password">WiFi Password</label>
    <input id="password" name="password" type="password" value="{{CURRENT_PASSWORD}}" required />

    <label for="powerMode">Power Mode</label>
    <select id="powerMode" name="powerMode">
      <option value="0" {{POWER_SEL_SLEEP}}>Normal Sleep</option>
      <option value="1" {{POWER_SEL_AWAKE}}>Always Awake</option>
    </select>

    <button type="submit">Save WiFi Settings</button>
  </form>

  <div class="card">
    <p><strong>Pairing token:</strong> <code id="pairingToken">{{PAIRING_TOKEN}}</code></p>
    <p>After WiFi connects, finish pairing here:</p>
    <p><a id="pairingLink" href="{{PAIRING_URL}}" target="_blank" rel="noopener">{{PAIRING_URL}}</a></p>
  </div>

  <div id="status" class="status"></div>

  <script>
    const statusEl = document.getElementById('status');
    const form = document.getElementById('configForm');
    const pairingLink = document.getElementById('pairingLink');

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.style.color = isError ? '#c00' : '#060';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      setStatus('Saving WiFi settings...');
      const body = new URLSearchParams(new FormData(form));
      try {
        const res = await fetch('/save', { method: 'POST', body });
        if (!res.ok) throw new Error('save failed');
        const data = await res.json();
        if (data?.pairingUrl) {
          pairingLink.href = data.pairingUrl;
          pairingLink.textContent = data.pairingUrl;
        }
        if (data?.wifiConnected) {
          setStatus('WiFi connected. Opening pairing page...');
          setTimeout(() => window.location.href = pairingLink.href, 800);
        } else {
          setStatus('Saved. If WiFi is not connected yet, reboot the frame then open the pairing link.');
        }
      } catch (_) {
        setStatus('Failed to save settings.', true);
      }
    });
  </script>
</body>
</html>
