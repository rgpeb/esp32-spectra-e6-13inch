<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Frame Local Portal</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 560px; margin: 0 auto; padding: 16px; }
    h1 { font-size: 1.3rem; }
    label { display: block; margin: 12px 0 6px; font-weight: 600; }
    input, select, button { width: 100%; padding: 10px; margin-bottom: 8px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
    .status { min-height: 20px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>E-Ink Photo Frame Local Portal</h1>

  <form id="configForm" class="card">
    <label for="ssid">WiFi SSID</label>
    <input id="ssid" name="ssid" type="text" value="{{CURRENT_SSID}}" required />

    <label for="password">WiFi Password</label>
    <input id="password" name="password" type="password" value="{{CURRENT_PASSWORD}}" required />

    <label for="powerMode">Power Mode</label>
    <select id="powerMode" name="powerMode">
      <option value="0" {{POWER_SEL_SLEEP}}>Normal Sleep</option>
      <option value="1" {{POWER_SEL_AWAKE}}>Always Awake</option>
    </select>

    <button type="submit">Save WiFi Settings</button>
  </form>

  <div class="card">
    <button id="refreshNowButton" type="button">Refresh Now</button>
    <small>Checks <code>status.json</code>, downloads <code>current.bin</code> if changed, and redraws immediately.</small>
  </div>

  <div class="card">
    <button id="resetSetupButton" type="button">Reset Frame Setup / Forget Network</button>
    <label for="clearPairing">
      <input id="clearPairing" type="checkbox" style="width:auto; margin-right:6px;" />
      Also clear assigned deviceId / pairing state
    </label>
  </div>

  <div id="status" class="status"></div>

  <script>
    const statusEl = document.getElementById('status');
    const form = document.getElementById('configForm');
    const refreshNowButton = document.getElementById('refreshNowButton');
    const resetSetupButton = document.getElementById('resetSetupButton');
    const clearPairing = document.getElementById('clearPairing');

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.style.color = isError ? '#c00' : '#060';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      setStatus('Saving WiFi settings...');
      const body = new URLSearchParams(new FormData(form));
      try {
        const res = await fetch('/save', { method: 'POST', body });
        if (!res.ok) throw new Error('save failed');
        const data = await res.json();
        if (data?.wifiConnected) {
          setStatus('WiFi connected and settings saved.');
        } else {
          setStatus('Saved. Frame will use these credentials on next connection attempt.');
        }
      } catch (_) {
        setStatus('Failed to save settings.', true);
      }
    });

    refreshNowButton.addEventListener('click', async () => {
      setStatus('Refreshing display now...');
      try {
        const res = await fetch('/api/refresh-display', { method: 'POST' });
        if (!res.ok) throw new Error('refresh failed');
        setStatus('Refresh requested. The frame will check status and redraw if needed.');
      } catch (_) {
        setStatus('Failed to request refresh.', true);
      }
    });

    resetSetupButton.addEventListener('click', async () => {
      const withPairingReset = clearPairing.checked;
      const confirmed = window.confirm(
        withPairingReset
          ? 'Forget WiFi and clear pairing state? The frame will reboot into setup mode.'
          : 'Forget WiFi credentials? The frame will reboot into setup mode.'
      );
      if (!confirmed) return;

      setStatus('Resetting setup and rebooting...');
      const body = new URLSearchParams();
      body.set('clearPairing', withPairingReset ? '1' : '0');
      try {
        const res = await fetch('/api/reset-setup', { method: 'POST', body });
        if (!res.ok) throw new Error('reset failed');
        setStatus('Reset requested. Rebooting into QR + WiFi setup mode...');
      } catch (_) {
        setStatus('Failed to reset setup.', true);
      }
    });
  </script>
</body>
</html>
