<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Frame Setup</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 560px; margin: 0 auto; padding: 16px; }
    h1 { font-size: 1.3rem; }
    label { display: block; margin: 12px 0 6px; font-weight: 600; }
    input, select, button { width: 100%; padding: 10px; margin-bottom: 8px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
    .small { font-size: 0.85rem; color: #555; word-break: break-all; }
    .status { min-height: 20px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>E-Ink Photo Frame</h1>

  <div class="card">
    <div><strong>Fixed image source:</strong></div>
    <div class="small">{{FIXED_IMAGE_URL}}</div>
  </div>

  <form id="configForm" class="card">
    <label for="ssid">WiFi SSID</label>
    <input id="ssid" name="ssid" type="text" value="{{CURRENT_SSID}}" required />

    <label for="password">WiFi Password</label>
    <input id="password" name="password" type="password" value="{{CURRENT_PASSWORD}}" required />

    <label for="powerMode">Power Mode</label>
    <select id="powerMode" name="powerMode">
      <option value="0" {{POWER_SEL_SLEEP}}>Normal Sleep</option>
      <option value="1" {{POWER_SEL_AWAKE}}>Always Awake</option>
    </select>

    <button type="submit">Save WiFi Settings</button>
  </form>

  <div class="card">
    <button id="refreshBtn" type="button">Refresh Display Now</button>
  </div>

  <div id="status" class="status"></div>

  <script>
    const statusEl = document.getElementById('status');
    const form = document.getElementById('configForm');
    const refreshBtn = document.getElementById('refreshBtn');

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.style.color = isError ? '#c00' : '#060';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      setStatus('Saving...');
      const body = new URLSearchParams(new FormData(form));
      try {
        const res = await fetch('/save', { method: 'POST', body });
        if (!res.ok) throw new Error('save failed');
        setStatus('Saved. Device will use the fixed remote image URL.');
      } catch (_) {
        setStatus('Failed to save settings.', true);
      }
    });

    refreshBtn.addEventListener('click', async () => {
      setStatus('Refreshing display...');
      try {
        const res = await fetch('/api/refresh-display', { method: 'POST' });
        if (!res.ok) throw new Error('refresh failed');
        setStatus('Refresh requested successfully.');
      } catch (_) {
        setStatus('Failed to trigger refresh.', true);
      }
    });
  </script>
</body>
</html>
